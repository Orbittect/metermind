{% extends "base.html" %}
{% block title %}Edit Property — MeterMind{% endblock %}

{% block content %}
<div style="max-width:560px;margin:0 auto">
  <div style="margin-bottom:20px">
    <a href="{{ url_for('main.dashboard') }}" style="color:#4b5563;font-size:13px;text-decoration:none">← Back to dashboard</a>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Edit Property</span>
      <span style="font-size:12px;color:#9ca3af;font-family:monospace">{{ prop.account_number }}</span>
    </div>

    <form method="POST">
      <div style="background:#e8f0fd;border-radius:8px;padding:16px;margin-bottom:20px">
        <div style="font-size:12px;font-weight:600;color:#1a56db;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Account Identification</div>
        <div class="form-group" style="margin-bottom:0">
          <label for="service_address">Service Address</label>
          <input type="text" id="service_address" name="service_address"
                 value="{{ prop.service_address }}" required/>
        </div>
      </div>

      <div style="background:#f9fafb;border-radius:8px;padding:16px;margin-bottom:20px">
        <div style="font-size:12px;font-weight:600;color:#4b5563;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Alert Settings</div>

        <div class="form-row">
          <div class="form-group">
            <label for="max_bill_amount">Max Bill / Balance ($)</label>
            <input type="number" id="max_bill_amount" name="max_bill_amount"
                   value="{{ prop.max_bill_amount }}" min="0" step="0.01"/>
          </div>
          <div class="form-group">
            <label for="alert_type">Alert Type</label>
            <select id="alert_type" name="alert_type">
              <option value="high_bill" {{ 'selected' if prop.alert_type == 'high_bill' }}>High Bill</option>
              <option value="high_balance" {{ 'selected' if prop.alert_type == 'high_balance' }}>High Balance</option>
            </select>
          </div>
        </div>

        <div class="form-group" style="margin-bottom:0">
          <label>Notify me via</label>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" name="notify_inapp" {{ 'checked' if prop.notify_inapp }}/> In-app
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="notify_email" {{ 'checked' if prop.notify_email }}/> Email
            </label>
          </div>
        </div>
      </div>

      <div style="background:#f9fafb;border-radius:8px;padding:16px;margin-bottom:24px">
        <div style="font-size:12px;font-weight:600;color:#4b5563;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Check Schedule</div>
        <div class="form-group" style="margin-bottom:0">
          <label for="check_day">Day of month to check bill</label>
          <select id="check_day" name="check_day">
            {% for d in range(1, 29) %}
            <option value="{{ d }}" {{ 'selected' if prop.check_day == d }}>
              {{ d }}{{ 'st' if d == 1 else ('nd' if d == 2 else ('rd' if d == 3 else 'th')) }} of each month
            </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" type="submit">Save Changes</button>
        <a class="btn btn-outline" href="{{ url_for('main.dashboard') }}">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
